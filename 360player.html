<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>360° VR Player</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e8e4f0; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }
  #canvas-container { position: fixed; inset: 0; }
  canvas { display: block; }

  #hud { position: fixed; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
  #top-bar {
    pointer-events: all; display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px;
    background: linear-gradient(to bottom, rgba(10,10,15,0.85), transparent);
  }
  #video-title { font-size: 15px; font-weight: 500; }
  #video-meta  { font-size: 12px; color: #9b93b8; margin-top: 2px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 8px;
    background: rgba(255,255,255,0.08); border: 0.5px solid rgba(255,255,255,0.12);
    color: #e8e4f0; cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center; transition: background 0.15s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.16); }

  #bottom-bar {
    pointer-events: all; padding: 0 24px 22px;
    background: linear-gradient(to top, rgba(10,10,15,0.9), transparent);
  }
  #scrubber-wrap { position: relative; margin-bottom: 14px; cursor: pointer; height: 12px; display: flex; align-items: center; }
  #scrubber-track { position: absolute; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
  #scrubber-fill  { height: 100%; width: 0%; background: #8b5cf6; border-radius: 2px; }
  #controls { display: flex; align-items: center; gap: 12px; }
  .ctrl-btn { background: none; border: none; color: #e8e4f0; cursor: pointer; font-size: 20px; padding: 4px; opacity: 0.85; transition: opacity 0.15s; }
  .ctrl-btn:hover { opacity: 1; }
  #time-display { font-size: 13px; color: #9b93b8; font-variant-numeric: tabular-nums; }
  .spacer { flex: 1; }
  #vol-wrap { display: flex; align-items: center; gap: 8px; }
  #vol-slider { -webkit-appearance: none; width: 72px; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; outline: none; cursor: pointer; }
  #vol-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #e8e4f0; }

  #vr-btn {
    position: fixed; bottom: 90px; right: 24px; pointer-events: all;
    background: rgba(139,92,246,0.2); border: 0.5px solid rgba(139,92,246,0.5);
    color: #c4b5fd; padding: 10px 18px; border-radius: 8px;
    font-size: 13px; font-weight: 500; cursor: pointer; display: none; transition: background 0.15s;
  }
  #vr-btn:hover { background: rgba(139,92,246,0.35); }

  #drop-zone {
    position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(10,10,15,0.97); z-index: 20; gap: 16px;
  }
  #drop-zone h2 { font-size: 22px; font-weight: 500; }
  #drop-zone p  { font-size: 14px; color: #9b93b8; text-align: center; max-width: 320px; line-height: 1.6; }
  #drop-zone.drag-over { border: 2px dashed rgba(139,92,246,0.6); }
  .dz-btn { padding: 10px 24px; border-radius: 8px; background: rgba(139,92,246,0.2); border: 0.5px solid rgba(139,92,246,0.5); color: #c4b5fd; font-size: 14px; cursor: pointer; transition: background 0.15s; }
  .dz-btn:hover { background: rgba(139,92,246,0.35); }
  #url-input { flex:1; background:rgba(255,255,255,0.06); border:0.5px solid rgba(255,255,255,0.15); border-radius:8px; padding:9px 12px; color:#e8e4f0; font-size:13px; outline:none; }
  #file-input { display: none; }

  #loader { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(10,10,15,0.7); z-index: 15; flex-direction: column; gap: 12px; }
  #loader.show { display: flex; }
  .spinner { width: 36px; height: 36px; border-radius: 50%; border: 2px solid rgba(139,92,246,0.2); border-top-color: #8b5cf6; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #hint { position: fixed; bottom: 140px; left: 50%; transform: translateX(-50%); background: rgba(14,13,22,0.9); border: 0.5px solid rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 8px; font-size: 13px; color: #9b93b8; pointer-events: none; transition: opacity 0.5s; opacity: 0; }
  #hint.show { opacity: 1; }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="drop-zone">
  <div style="font-size:48px;opacity:0.5">🎬</div>
  <h2>360° VR Player</h2>
  <p>Drop a 360° video file here, or paste a URL. Works in browser and Meta Quest VR.</p>
  <button class="dz-btn" onclick="document.getElementById('file-input').click()">Open video file</button>
  <div style="display:flex;gap:8px;margin-top:4px;width:300px;">
    <input id="url-input" placeholder="Or paste a video URL…">
    <button class="dz-btn" style="padding:9px 14px;" onclick="loadURL()">Go</button>
  </div>
  <input type="file" id="file-input" accept="video/*">
</div>

<div id="loader"><div class="spinner"></div><span style="font-size:13px;color:#9b93b8">Loading…</span></div>

<div id="hud" style="display:none">
  <div id="top-bar">
    <div>
      <div id="video-title">Untitled 360° Video</div>
      <div id="video-meta">Equirectangular · 360°</div>
    </div>
  </div>
  <div id="bottom-bar">
    <div id="scrubber-wrap" onclick="scrubClick(event)">
      <div id="scrubber-track"><div id="scrubber-fill"></div></div>
    </div>
    <div id="controls">
      <button class="ctrl-btn" id="play-btn" onclick="togglePlay()">▶</button>
      <span id="time-display">0:00 / 0:00</span>
      <div class="spacer"></div>
      <div id="vol-wrap">
        <button class="ctrl-btn" onclick="toggleMute()">🔊</button>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)">
      </div>
      <button class="ctrl-btn" onclick="openNewFile()" style="font-size:15px">📂</button>
    </div>
  </div>
</div>

<button id="vr-btn" onclick="enterVR()">⬛ Enter VR</button>
<div id="hint">Drag to look around</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
let renderer, scene, camera;
let sphere, videoTexture;
let video = null;
let isDragging = false, prevX = 0, prevY = 0;
let yaw = 0, pitch = 0;
let xrSession = null;

// VR UI state
let vrPanel = null, vrPanelCanvas = null, vrPanelCtx = null, vrPanelTexture = null;
let vrCursor = null;
let vrControllers = [];
let raycaster = new THREE.Raycaster();

// ─── Three.js init ────────────────────────────────────────────────────────────
function initThree() {
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
  camera.position.set(0, 0, 0);

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Desktop mouse controls
  const el = renderer.domElement;
  el.addEventListener('mousedown',  e => { isDragging = true; prevX = e.clientX; prevY = e.clientY; });
  el.addEventListener('mouseup',    () => isDragging = false);
  el.addEventListener('mousemove',  onPointerMove);
  el.addEventListener('touchstart', e => { isDragging = true; prevX = e.touches[0].clientX; prevY = e.touches[0].clientY; }, { passive: true });
  el.addEventListener('touchend',   () => isDragging = false);
  el.addEventListener('touchmove',  e => onPointerMove({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY }), { passive: true });

  document.addEventListener('keydown', e => {
    if (!video) return;
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowRight') video.currentTime += 5;
    if (e.code === 'ArrowLeft')  video.currentTime -= 5;
    if (e.code === 'KeyM') toggleMute();
    if (e.code === 'KeyF') toggleFullscreen();
  });

  // WebXR check
  if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-vr').then(ok => {
      if (ok) document.getElementById('vr-btn').style.display = 'block';
    });
  }

  renderer.setAnimationLoop(render);
}

function onPointerMove(e) {
  if (!isDragging) return;
  yaw   -= (e.clientX - prevX) * 0.25;
  pitch -= (e.clientY - prevY) * 0.25;
  pitch  = Math.max(-85, Math.min(85, pitch));
  prevX = e.clientX; prevY = e.clientY;
}

// ─── 360 sphere ───────────────────────────────────────────────────────────────
function createSphere(texture) {
  if (sphere) scene.remove(sphere);
  const geo = new THREE.SphereGeometry(500, 60, 40);
  geo.scale(-1, 1, 1);
  sphere = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ map: texture }));
  scene.add(sphere);
}

// ─── VR Panel (in-world UI) ───────────────────────────────────────────────────
const PANEL_W = 1024, PANEL_H = 256; // canvas pixels
const PANEL_WORLD_W = 1.8, PANEL_WORLD_H = 0.45; // metres in VR world

function createVRPanel() {
  // Off-screen canvas we draw UI onto
  vrPanelCanvas = document.createElement('canvas');
  vrPanelCanvas.width  = PANEL_W;
  vrPanelCanvas.height = PANEL_H;
  vrPanelCtx = vrPanelCanvas.getContext('2d');

  vrPanelTexture = new THREE.CanvasTexture(vrPanelCanvas);

  const geo = new THREE.PlaneGeometry(PANEL_WORLD_W, PANEL_WORLD_H);
  const mat = new THREE.MeshBasicMaterial({ map: vrPanelTexture, transparent: true, side: THREE.DoubleSide });
  vrPanel = new THREE.Mesh(geo, mat);

  // Float the panel in front of and slightly below the player
  vrPanel.position.set(0, -0.5, -2.2);
  vrPanel.visible = false; // hidden until VR starts
  scene.add(vrPanel);

  // Dot cursor for controller ray intersection
  const curGeo = new THREE.SphereGeometry(0.012, 8, 8);
  const curMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  vrCursor = new THREE.Mesh(curGeo, curMat);
  vrCursor.visible = false;
  scene.add(vrCursor);

  drawVRPanel();
}

// ─── Draw the VR panel canvas ─────────────────────────────────────────────────
function drawVRPanel() {
  if (!vrPanelCtx || !video) return;
  const ctx = vrPanelCtx;
  const W = PANEL_W, H = PANEL_H;

  // Background
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(10, 8, 20, 0.88)';
  roundRect(ctx, 0, 0, W, H, 32);
  ctx.fill();

  // Border
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 2;
  roundRect(ctx, 1, 1, W-2, H-2, 31);
  ctx.stroke();

  // Video title
  ctx.fillStyle = '#e8e4f0';
  ctx.font = '500 36px system-ui, sans-serif';
  ctx.fillText(document.getElementById('video-title').textContent, 40, 62);

  // Time
  const timeStr = video ? (fmt(video.currentTime) + '  /  ' + fmt(video.duration || 0)) : '0:00 / 0:00';
  ctx.fillStyle = '#9b93b8';
  ctx.font = '400 28px system-ui, sans-serif';
  ctx.fillText(timeStr, 40, 108);

  // Scrubber track
  const barX = 40, barY = 136, barW = W - 80, barH = 10;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  roundRect(ctx, barX, barY, barW, barH, 5);
  ctx.fill();

  // Scrubber fill
  const pct = (video && video.duration) ? video.currentTime / video.duration : 0;
  ctx.fillStyle = '#8b5cf6';
  roundRect(ctx, barX, barY, barW * pct, barH, 5);
  ctx.fill();

  // Buttons  — ◀◀  ▶/⏸  ▶▶  🔇/🔊
  const btns = [
    { label: '−10s', x: 40,  y: 175, w: 120, h: 52, id: 'seek-back' },
    { label: video && !video.paused ? '⏸' : '▶', x: 180, y: 175, w: 120, h: 52, id: 'play'      },
    { label: '+10s', x: 320, y: 175, w: 120, h: 52, id: 'seek-fwd'  },
    { label: video && video.muted ? '🔇' : '🔊', x: 460, y: 175, w: 120, h: 52, id: 'mute'      },
    { label: 'Exit VR', x: 864, y: 175, w: 120, h: 52, id: 'exit-vr' },
  ];

  btns.forEach(btn => {
    ctx.fillStyle = btn.id === 'exit-vr' ? 'rgba(139,92,246,0.3)' : 'rgba(255,255,255,0.1)';
    roundRect(ctx, btn.x, btn.y, btn.w, btn.h, 12);
    ctx.fill();
    ctx.strokeStyle = btn.id === 'exit-vr' ? 'rgba(139,92,246,0.6)' : 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1.5;
    roundRect(ctx, btn.x, btn.y, btn.w, btn.h, 12);
    ctx.stroke();
    ctx.fillStyle = btn.id === 'exit-vr' ? '#c4b5fd' : '#e8e4f0';
    ctx.font = '500 24px system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(btn.label, btn.x + btn.w / 2, btn.y + btn.h / 2 + 9);
    ctx.textAlign = 'left';
  });

  // Store button hit regions for raycasting
  vrPanel.userData.buttons = btns;
  vrPanelTexture.needsUpdate = true;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ─── VR Controller setup ──────────────────────────────────────────────────────
function setupControllers() {
  for (let i = 0; i < 2; i++) {
    const ctrl = renderer.xr.getController(i);
    ctrl.addEventListener('selectstart', () => onVRSelect(ctrl));
    scene.add(ctrl);

    // Visible ray line from controller
    const lineGeo = new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, 0),
      new THREE.Vector3(0, 0, -1)
    ]);
    const lineMat = new THREE.LineBasicMaterial({ color: 0xffffff, opacity: 0.4, transparent: true });
    const line = new THREE.Line(lineGeo, lineMat);
    line.scale.z = 5;
    ctrl.add(line);
    vrControllers.push(ctrl);
  }
}

function onVRSelect(ctrl) {
  if (!vrPanel || !vrPanel.visible) return;
  const hit = getControllerPanelHit(ctrl);
  if (!hit) return;

  // Convert UV hit to canvas pixel coordinates
  const u = hit.uv.x, v = 1 - hit.uv.y;
  const px = u * PANEL_W, py = v * PANEL_H;

  const buttons = vrPanel.userData.buttons || [];
  for (const btn of buttons) {
    if (px >= btn.x && px <= btn.x + btn.w && py >= btn.y && py <= btn.y + btn.h) {
      handleVRButton(btn.id);
      break;
    }
  }
}

function getControllerPanelHit(ctrl) {
  const tempMatrix = new THREE.Matrix4();
  tempMatrix.identity().extractRotation(ctrl.matrixWorld);
  raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
  raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
  const hits = raycaster.intersectObject(vrPanel);
  return hits.length > 0 ? hits[0] : null;
}

function handleVRButton(id) {
  if (!video) return;
  if (id === 'play')      { togglePlay(); }
  if (id === 'seek-back') { video.currentTime = Math.max(0, video.currentTime - 10); }
  if (id === 'seek-fwd')  { video.currentTime = Math.min(video.duration, video.currentTime + 10); }
  if (id === 'mute')      { toggleMute(); }
  if (id === 'exit-vr')   { if (xrSession) xrSession.end(); }
  drawVRPanel();
}

// ─── Load video ────────────────────────────────────────────────────────────────
function loadVideo(src, title) {
  document.getElementById('loader').classList.add('show');
  if (video) { video.pause(); video.src = ''; }

  video = document.createElement('video');
  video.crossOrigin = 'anonymous';
  video.loop = false;
  video.muted = false;
  video.playsInline = true;
  video.src = src;

  video.addEventListener('loadedmetadata', () => {
    videoTexture = new THREE.VideoTexture(video);
    videoTexture.minFilter = THREE.LinearFilter;
    videoTexture.magFilter = THREE.LinearFilter;
    videoTexture.format = THREE.RGBFormat;
    createSphere(videoTexture);

    const t = title || src.split('/').pop() || 'Untitled 360° Video';
    document.getElementById('video-title').textContent = t;
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('loader').classList.remove('show');
    document.getElementById('hud').style.display = 'flex';

    if (!vrPanel) createVRPanel();
    else drawVRPanel();

    video.play();
    updatePlayBtn();
    showHint('Drag to look around');
  });

  video.addEventListener('timeupdate', () => {
    updateScrubber();
    drawVRPanel();
  });
  video.addEventListener('ended', () => updatePlayBtn());
  video.addEventListener('error', () => {
    document.getElementById('loader').classList.remove('show');
    alert('Could not load video. Check the URL and CORS permissions.');
  });
}

// ─── Desktop controls ─────────────────────────────────────────────────────────
function togglePlay() {
  if (!video) return;
  video.paused ? video.play() : video.pause();
  updatePlayBtn();
  drawVRPanel();
}
function updatePlayBtn() {
  document.getElementById('play-btn').textContent = (video && !video.paused) ? '⏸' : '▶';
}
function setVolume(v) { if (video) video.volume = v; }
function toggleMute() {
  if (!video) return;
  video.muted = !video.muted;
  drawVRPanel();
}
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
function scrubClick(e) {
  if (!video) return;
  const rect = e.currentTarget.getBoundingClientRect();
  video.currentTime = ((e.clientX - rect.left) / rect.width) * video.duration;
}
function updateScrubber() {
  if (!video || !video.duration) return;
  const pct = (video.currentTime / video.duration) * 100;
  document.getElementById('scrubber-fill').style.width = pct + '%';
  document.getElementById('time-display').textContent = fmt(video.currentTime) + ' / ' + fmt(video.duration);
}
function fmt(s) {
  const m = Math.floor(s / 60);
  return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
}
function openNewFile() { document.getElementById('file-input').click(); }

// ─── File / URL ────────────────────────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', e => {
  const f = e.target.files[0];
  if (f) loadVideo(URL.createObjectURL(f), f.name.replace(/\.[^.]+$/, ''));
});
function loadURL() {
  const u = document.getElementById('url-input').value.trim();
  if (u) loadVideo(u);
}
document.getElementById('url-input').addEventListener('keydown', e => { if (e.key === 'Enter') loadURL(); });

const dz = document.getElementById('drop-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('video/')) loadVideo(URL.createObjectURL(f), f.name.replace(/\.[^.]+$/, ''));
});

// ─── WebXR ────────────────────────────────────────────────────────────────────
async function enterVR() {
  if (!navigator.xr) return;
  xrSession = await navigator.xr.requestSession('immersive-vr', {
    optionalFeatures: ['local-floor', 'bounded-floor']
  });
  renderer.xr.setSession(xrSession);
  setupControllers();

  if (vrPanel) vrPanel.visible = true;

  xrSession.addEventListener('end', () => {
    xrSession = null;
    vrControllers = [];
    if (vrPanel) vrPanel.visible = false;
  });
}

// ─── Render loop ─────────────────────────────────────────────────────────────
function render() {
  if (!renderer.xr.isPresenting) {
    const euler = new THREE.Euler(
      THREE.MathUtils.degToRad(pitch),
      THREE.MathUtils.degToRad(yaw),
      0, 'YXZ'
    );
    camera.quaternion.setFromEuler(euler);
  }

  // Update cursor position from first controller that hits the panel
  if (renderer.xr.isPresenting && vrPanel && vrPanel.visible) {
    let hitFound = false;
    for (const ctrl of vrControllers) {
      const hit = getControllerPanelHit(ctrl);
      if (hit) {
        vrCursor.position.copy(hit.point);
        vrCursor.visible = true;
        hitFound = true;
        break;
      }
    }
    if (!hitFound) vrCursor.visible = false;
  }

  if (videoTexture) videoTexture.needsUpdate = true;
  renderer.render(scene, camera);
}

// ─── Hint toast ────────────────────────────────────────────────────────────────
function showHint(msg) {
  const h = document.getElementById('hint');
  h.textContent = msg; h.classList.add('show');
  setTimeout(() => h.classList.remove('show'), 3000);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
initThree();
</script>
</body>
</html>
